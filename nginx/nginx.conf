# nginx/nginx.conf

upstream django_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # Django API 요청은 Gunicorn(backend 컨테이너)으로 프록시
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin 페이지도 동일하게 프록시
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django collectstatic 결과물 서빙 (Nginx가 직접 서빙, Gunicorn 부하 감소)
    location /static/ {
        alias /app/staticfiles/;
    }

    # TODO: React 프론트엔드 컨테이너 준비되면 아래 주석 해제하고 이 블록으로 교체
    # location / {
    #     proxy_pass http://frontend:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # 임시: frontend 컨테이너 없는 동안 기본 응답
    location / {
        return 200 "backend is running. frontend not yet connected.\n";
        add_header Content-Type text/plain;
    }
}